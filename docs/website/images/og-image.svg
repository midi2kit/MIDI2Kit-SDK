<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6C5CE7;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid lines -->
  <g opacity="0.06" stroke="#6C5CE7" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow effect -->
  <ellipse cx="600" cy="280" rx="400" ry="200" fill="url(#glow)"/>

  <!-- MIDI connector icon -->
  <g transform="translate(510, 160)" opacity="0.9">
    <circle cx="90" cy="0" r="60" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <circle cx="60" cy="-25" r="6" fill="#6C5CE7"/>
    <circle cx="120" cy="-25" r="6" fill="#6C5CE7"/>
    <circle cx="45" cy="5" r="6" fill="#a29bfe"/>
    <circle cx="135" cy="5" r="6" fill="#a29bfe"/>
    <circle cx="90" cy="20" r="6" fill="#6C5CE7"/>
  </g>

  <!-- Title -->
  <text x="600" y="310" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-1">MIDI2Kit</text>

  <!-- Subtitle -->
  <text x="600" y="370" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="400" fill="url(#accent)">MIDI 2.0 for Swift</text>

  <!-- Feature tags -->
  <g transform="translate(600, 430)" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#8888aa">
    <text x="-280" y="0">UMP</text>
    <text x="-200" y="0" fill="#333355">|</text>
    <text x="-130" y="0">MIDI-CI</text>
    <text x="-50" y="0" fill="#333355">|</text>
    <text x="30" y="0">Property Exchange</text>
    <text x="150" y="0" fill="#333355">|</text>
    <text x="250" y="0">Profile Config</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)"/>

  <!-- Swift bird hint -->
  <text x="600" y="500" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#555570">macOS · iOS · tvOS · visionOS</text>
</svg>
